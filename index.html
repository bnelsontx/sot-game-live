<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Source of Truth or Consequences — A Nautobot Idle Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loading-screen">
    <div class="boot-terminal">
      <div class="boot-header">
        <span class="boot-dot boot-dot--red"></span>
        <span class="boot-dot boot-dot--yellow"></span>
        <span class="boot-dot boot-dot--green"></span>
        <span class="boot-title">nautobot-console</span>
      </div>
      <div id="boot-messages" class="boot-messages"></div>
      <div class="boot-progress">
        <div id="boot-progress-bar" class="boot-progress-bar"></div>
      </div>
    </div>
  </div>
  <div id="game-container" class="hidden"></div>
  <script src="game.js"></script>
</body>
</html>
